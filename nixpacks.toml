# nixpacks.toml
[build]
install_cmd = "pip install --no-cache-dir -r requirements.txt && playwright install chromium 2>/dev/null || true && python manage.py collectstatic --noinput --clear"

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[start]
cmd = "gunicorn maps_scraper_admin.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"

[deploy]
healthcheck = "/"
